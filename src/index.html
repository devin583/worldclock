<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldClock</title>
  <link rel="stylesheet" href="style.css?v=20260521d" />
</head>
<body class="theme-dark">

  <!-- 顶栏：拖动区 + 控制按钮 -->
  <div id="bar">
    <div id="drag-region">
      <span id="app-title">WorldClock</span>
    </div>
    <div id="bar-controls">
      <button id="btn-settings" title="设置" aria-label="设置">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5.9z"></path>
        </svg>
      </button>
      <button id="btn-lock" title="锁定" aria-label="锁定">
        <svg class="icon-lock-open" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="5" y="11" width="14" height="10" rx="2"></rect>
          <path d="M8 11V7a4 4 0 0 1 7.7-1.4"></path>
        </svg>
        <svg class="icon-lock-closed" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="5" y="11" width="14" height="10" rx="2"></rect>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
        </svg>
      </button>
      <button id="btn-hide" title="最小化到托盘" aria-label="最小化到托盘">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- 锁定遮罩（z-index < 顶栏） -->
  <div id="lock-overlay" class="hidden">
    <span>🔒 已锁定</span>
  </div>

  <!-- 主内容区 -->
  <div id="main">
    <!-- 时钟 1：Budapest -->
    <div class="clock-card" id="card-1">
      <div class="city-label" id="label-1">Budapest</div>

      <!-- 数字时钟 -->
      <div class="digital-time" id="digital-1">00:00:00</div>
      <div class="digital-date" id="date-1">Mon, 01 Jan</div>

      <!-- 模拟时钟 SVG -->
      <svg class="analog-clock" id="analog-1" viewBox="0 0 200 200">
        <circle class="clock-face" cx="100" cy="100" r="95"/>
        <g id="ticks-1"></g>
        <line class="hand hour-hand"   id="hour-1"   x1="100" y1="100" x2="100" y2="45"/>
        <line class="hand minute-hand" id="minute-1" x1="100" y1="100" x2="100" y2="30"/>
        <line class="hand second-hand" id="second-1" x1="100" y1="110" x2="100" y2="20"/>
        <circle class="center-dot" cx="100" cy="100" r="4"/>
      </svg>

      <div class="offset-label" id="offset-1"></div>
    </div>

    <!-- 时钟 2：Beijing -->
    <div class="clock-card" id="card-2">
      <div class="city-label" id="label-2">Beijing</div>

      <div class="digital-time" id="digital-2">00:00:00</div>
      <div class="digital-date" id="date-2">Mon, 01 Jan</div>

      <svg class="analog-clock" id="analog-2" viewBox="0 0 200 200">
        <circle class="clock-face" cx="100" cy="100" r="95"/>
        <g id="ticks-2"></g>
        <line class="hand hour-hand"   id="hour-2"   x1="100" y1="100" x2="100" y2="45"/>
        <line class="hand minute-hand" id="minute-2" x1="100" y1="100" x2="100" y2="30"/>
        <line class="hand second-hand" id="second-2" x1="100" y1="110" x2="100" y2="20"/>
        <circle class="center-dot" cx="100" cy="100" r="4"/>
      </svg>

      <div class="offset-label" id="offset-2"></div>
    </div>
  </div>

  <!-- 底部模式切换 -->
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="digital">数字</button>
    <button class="mode-btn" data-mode="analog">时钟</button>
    <button class="mode-btn" data-mode="both">双显</button>
  </div>

  <!-- 设置面板 -->
  <div id="settings-panel" class="hidden">
    <h3>设置</h3>

    <section>
      <label>时钟 1 城市名</label>
      <input type="text" id="set-label-1" value="Budapest" />
      <label>时区</label>
      <input type="text" id="set-tz-1" list="timezone-options" value="Europe/Budapest" />
    </section>

    <section>
      <label>时钟 2 城市名</label>
      <input type="text" id="set-label-2" value="Beijing" />
      <label>时区</label>
      <input type="text" id="set-tz-2" list="timezone-options" value="Asia/Shanghai" />
    </section>

    <datalist id="timezone-options"></datalist>

    <section>
      <label>主题</label>
      <div class="radio-group">
        <label><input type="radio" name="theme" value="dark" checked /> 深色</label>
        <label><input type="radio" name="theme" value="light" /> 浅色</label>
      </div>
    </section>

    <section>
      <label class="toggle-label">
        <input type="checkbox" id="set-ontop" checked />
        始终置顶
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="set-autostart" />
        开机自启
      </label>
    </section>

    <div class="settings-actions">
      <button id="btn-apply">应用</button>
      <button id="btn-cancel">取消</button>
    </div>
  </div>

  <script>
    window.addEventListener('error', event => {
      const title = document.getElementById('app-title');
      const offset = document.getElementById('offset-1');
      if (title) title.textContent = 'WorldClock JS Error';
      if (offset && event?.message) offset.textContent = String(event.message).slice(0, 80);
    });

    window.addEventListener('unhandledrejection', event => {
      const title = document.getElementById('app-title');
      const offset = document.getElementById('offset-1');
      if (title) title.textContent = 'WorldClock Promise Error';
      if (offset && event?.reason) offset.textContent = String(event.reason).slice(0, 80);
    });
  </script>
  <script src="main.js?v=20260521d"></script>
  <script>
    setTimeout(() => {
      if (window.__worldClockMainStarted) return;

      const tauriInvoke = window.__TAURI__?.core?.invoke;
      const invoke = typeof tauriInvoke === 'function'
        ? async (cmd, args) => {
          try {
            return await tauriInvoke(cmd, args);
          } catch (error) {
            console.warn('[fallback invoke failed]', cmd, error);
            return null;
          }
        }
        : async () => null;
      const isTauri = typeof tauriInvoke === 'function';

      const title = document.getElementById('app-title');
      if (title) title.textContent = 'WorldClock Fallback';

      const TIMEZONES = [
        'Europe/Budapest','Europe/London','Europe/Paris','Europe/Berlin','Europe/Rome',
        'Europe/Madrid','Europe/Warsaw','Europe/Kiev','Europe/Moscow','Europe/Istanbul',
        'Asia/Shanghai','Asia/Tokyo','Asia/Seoul','Asia/Singapore','Asia/Hong_Kong',
        'Asia/Kolkata','Asia/Dubai','Asia/Karachi','Asia/Bangkok','Asia/Jakarta',
        'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
        'America/Toronto','America/Sao_Paulo','America/Buenos_Aires','America/Mexico_City',
        'Pacific/Auckland','Pacific/Sydney','Pacific/Honolulu',
        'Africa/Cairo','Africa/Lagos','Africa/Nairobi','Atlantic/Reykjavik','UTC'
      ];

      const modeBtns = document.querySelectorAll('.mode-btn');
      const cards = [document.getElementById('card-1'), document.getElementById('card-2')];
      const dragRegion = document.getElementById('drag-region');
      const lockOverlay = document.getElementById('lock-overlay');
      const settingsPanel = document.getElementById('settings-panel');
      const btnLock = document.getElementById('btn-lock');
      const btnSettings = document.getElementById('btn-settings');
      const btnHide = document.getElementById('btn-hide');

      const config = {
        clocks: [
          { label: 'Budapest', tz: 'Europe/Budapest' },
          { label: 'Beijing', tz: 'Asia/Shanghai' }
        ],
        mode: 'digital',
        locked: false,
        on_top: true,
        theme: 'dark'
      };

      function populateTimezoneOptions() {
        const datalist = document.getElementById('timezone-options');
        datalist.innerHTML = '';
        TIMEZONES.forEach(tz => {
          const option = document.createElement('option');
          option.value = tz;
          datalist.appendChild(option);
        });
      }

      function resolveTimezone(value, fallback) {
        const query = value.trim().toLowerCase();
        if (!query) return fallback;
        return TIMEZONES.find(tz => tz.toLowerCase() === query)
          || TIMEZONES.find(tz => tz.toLowerCase().includes(query))
          || fallback;
      }

      function drawTicks(groupId) {
        const group = document.getElementById(groupId);
        if (!group) return;
        group.innerHTML = '';
        for (let i = 0; i < 60; i++) {
          const angle = (i / 60) * 360;
          const isHour = i % 5 === 0;
          const r1 = isHour ? 80 : 88;
          const r2 = 93;
          const rad = (angle - 90) * Math.PI / 180;
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', 100 + r1 * Math.cos(rad));
          line.setAttribute('y1', 100 + r1 * Math.sin(rad));
          line.setAttribute('x2', 100 + r2 * Math.cos(rad));
          line.setAttribute('y2', 100 + r2 * Math.sin(rad));
          line.setAttribute('stroke', 'var(--tick-color)');
          line.setAttribute('stroke-width', isHour ? 2 : 1);
          group.appendChild(line);
        }
      }

      function setHand(id, angle) {
        const hand = document.getElementById(id);
        if (!hand) return;
        hand.style.transform = `rotate(${angle}deg)`;
        hand.setAttribute('transform', `rotate(${angle} 100 100)`);
      }

      function setTheme(theme) {
        config.theme = theme;
        document.body.classList.remove('theme-dark', 'theme-light');
        document.body.classList.add(`theme-${theme}`);
      }

      function applyOnTop(enabled) {
        config.on_top = enabled;
        if (isTauri) invoke('set_window_on_top', { enabled });
      }

      function setMode(mode) {
        config.mode = mode;
        modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
        cards.forEach(card => {
          card.className = 'clock-card';
          card.classList.add(`mode-${mode}`);
        });
      }

      function setLock(locked) {
        config.locked = locked;
        document.body.classList.toggle('is-locked', locked);
        lockOverlay.classList.add('hidden');
        btnLock.classList.toggle('locked', locked);
        btnLock.setAttribute('aria-label', locked ? '解锁' : '锁定');
        btnLock.title = locked ? '解锁' : '锁定';
      }

      function tickFallback() {
        const now = new Date();
        config.clocks.forEach((clock, index) => {
          const idx = index + 1;
          const parts = new Intl.DateTimeFormat('en-GB', {
            timeZone: clock.tz,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
          }).formatToParts(now);
          const get = type => parts.find(part => part.type === type)?.value || '00';
          const hh = get('hour');
          const mm = get('minute');
          const ss = get('second');

          const date = new Intl.DateTimeFormat('en-GB', {
            timeZone: clock.tz,
            weekday: 'short',
            day: 'numeric',
            month: 'short'
          }).format(now);

          document.getElementById(`digital-${idx}`).textContent = `${hh}:${mm}:${ss}`;
          document.getElementById(`date-${idx}`).textContent = date;
          setHand(`hour-${idx}`, ((parseInt(hh, 10) % 12) + parseInt(mm, 10) / 60) * 30);
          setHand(`minute-${idx}`, (parseInt(mm, 10) + parseInt(ss, 10) / 60) * 6);
          setHand(`second-${idx}`, parseInt(ss, 10) * 6);
        });
      }

      function openSettings() {
        populateTimezoneOptions();
        document.getElementById('set-label-1').value = config.clocks[0].label;
        document.getElementById('set-label-2').value = config.clocks[1].label;
        document.getElementById('set-tz-1').value = config.clocks[0].tz;
        document.getElementById('set-tz-2').value = config.clocks[1].tz;
        document.querySelectorAll('input[name="theme"]').forEach(input => {
          input.checked = input.value === config.theme;
        });
        document.getElementById('set-ontop').checked = config.on_top;
        settingsPanel.classList.remove('hidden');
      }

      function applySettings() {
        config.clocks[0].label = document.getElementById('set-label-1').value.trim() || 'Budapest';
        config.clocks[0].tz = resolveTimezone(
          document.getElementById('set-tz-1').value,
          config.clocks[0].tz
        );
        config.clocks[1].label = document.getElementById('set-label-2').value.trim() || 'Beijing';
        config.clocks[1].tz = resolveTimezone(
          document.getElementById('set-tz-2').value,
          config.clocks[1].tz
        );
        applyOnTop(document.getElementById('set-ontop').checked);
        setTheme(document.querySelector('input[name="theme"]:checked')?.value || 'dark');
        document.getElementById('label-1').textContent = config.clocks[0].label;
        document.getElementById('label-2').textContent = config.clocks[1].label;
        setMode(config.mode);
        tickFallback();
        settingsPanel.classList.add('hidden');
      }

      drawTicks('ticks-1');
      drawTicks('ticks-2');
      setTheme(config.theme);
      setMode(config.mode);

      dragRegion.addEventListener('pointerdown', event => {
        if (!isTauri || config.locked || event.button !== 0) return;
        invoke('start_dragging');
      });

      btnSettings.addEventListener('click', () => {
        if (settingsPanel.classList.contains('hidden')) openSettings();
        else settingsPanel.classList.add('hidden');
      });

      document.getElementById('btn-cancel').addEventListener('click', () => {
        settingsPanel.classList.add('hidden');
      });

      document.getElementById('btn-apply').addEventListener('click', applySettings);

      btnLock.addEventListener('click', () => {
        setLock(!config.locked);
      });

      modeBtns.forEach(button => {
        button.addEventListener('click', () => setMode(button.dataset.mode));
      });

      btnHide.addEventListener('click', () => {
        if (isTauri) invoke('hide_window');
        else window.close();
      });

      tickFallback();
      setInterval(tickFallback, 1000);
    }, 300);
  </script>
</body>
</html>
