name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri Windows app
        run: npx tauri build --no-bundle

      - name: Package portable executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src-tauri/target/release/worldclock.exe dist/worldclock.exe
          Compress-Archive -Path dist/worldclock.exe -DestinationPath dist/worldclock-portable.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldclock-windows
          if-no-files-found: error
          path: |
            dist/worldclock-portable.zip
            dist/worldclock.exe
